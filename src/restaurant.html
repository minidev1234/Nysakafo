<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <title>NySakafo</title>
    </head>
    <body class="bg-[#f5e6cc]">
        <header class="sticky top-5 lg:top-0 width-full h-auto flex flex-wrap justify-between bg-white/60 mb-10">

                class="flex flex-left 
                w-[40px] md:w-40 lg:w-40
                mx-auto md:mx-5 lg:mx-5
                md:my-auto lg:my-auto">
            <nav class="
                flex flex-right 
                width-full 
                gap-10 p-2 
                mx-auto 
                md:mx-5 md:my-auto 
                lg:m-10 lg:my-auto 
                text-[#130871] font-light">
                <a href="index.html">Acceuil</a>
                <a href="#products">Nos produits</a>
                <a href="#info">A propos</a>
            </nav>
        </header>
        <p class="text-2xl text-center p-2 font-bold text-[#4A2C2A]">Restaurant</p>
        <main class="mx-5">  
            <div class="flex flex-wrap justify-center md:gap-24">
                <div class="w-[400px] md:w-[250px] hover:bg-black/60 rounded-2xl p-2">
                    <a href="#">
                        <img src="/img/dan-gold-E6HjQaB7UEA-unsplash.jpg" 
                            title="Photo by Dan Gold on Unsplash" 
                            class="rounded-t-2xl h-auto md:h-[350px] lg:h-[270px]">
                        <p class="text-white font-bold bg-[#4A2C2A] rounded-b-2xl p-2">
                            restaurant name here
                        </p>
                    </a>
                </div>
                <div class="w-[400px] md:w-[250px] hover:bg-black/60 rounded-2xl p-2">

                        <img src="/img/dan-gold-E6HjQaB7UEA-unsplash.jpg" 
                            title="Photo by Dan Gold on Unsplash" 
                            class="rounded-t-2xl h-auto md:h-[350px] lg:h-[270px]">
                        <p class="text-white font-bold bg-[#4A2C2A] rounded-b-2xl p-2">
                            restaurant name here
                        </p>
                    </a>
                </div>
            </div>       
        </main>
<footer id="info" class="flex flex-wrap justify-between mt-10 mx-5 border-t border-black/30">

                <p class="my-5 font-bold">Qui sommes nous?</p>

                    Nous sommes un platforme qui vise a faire connaitre le monde gastronomique de Madagascar <br>en recceuillant chaque menu des restaurants
                </p>
                <div class="flex flex-wrap gap-10 my-5">
                    <a href="#"><img src="/logo/facebook.svg" class="w-[50px] h-auto opacity-50"></a>
                    <a href="#"><img src="/logo/insta.svg" class=" w-[40px] h-auto opacity-50 mt-1"></a>
                </div>
            </div>
            <div class="flex justify-center gap-10 my-5">
                <div class="flex flex-col">
                    <p class="font-bold">Learn more</p>
                    <a href="#" class="font-light">story</a>
                    <a href="#" class="font-light">help us</a>
                </div>
                <div class="flex flex-col">
                    <p class="font-bold">Support</p>
                    <a href="#" class="font-light">Contact</a>
                    <a href="#" class="font-light">Legal</a>

            </div>
